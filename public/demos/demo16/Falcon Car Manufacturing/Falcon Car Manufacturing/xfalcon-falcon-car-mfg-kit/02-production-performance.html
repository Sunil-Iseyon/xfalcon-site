        function getFilters() {
            return {
                year: document.getElementById('yearFilter').value,
                plant: document.getElementById('plantFilter').value,
                brand: document.getElementById('brandFilter').value
            };
        }

        function updateKPIs(filtered) {
            var grid = document.getElementById('kpiGrid');
            grid.innerHTML = '';

            var totalProd = filtered.modelProduction.reduce(function(sum, d) { return sum + d.produced; }, 0);
            var totalPlan = filtered.modelProduction.reduce(function(sum, d) { return sum + d.planned; }, 0);
            var totalRework = filtered.modelProduction.reduce(function(sum, d) { return sum + d.reworked; }, 0);
            var totalScrap = filtered.modelProduction.reduce(function(sum, d) { return sum + d.scrapped; }, 0);
            var avgOEE = filtered.modelProduction.length > 0 ? (filtered.modelProduction.reduce(function(sum, d) { return sum + d.oee; }, 0) / filtered.modelProduction.length).toFixed(2) : 0;

            var yield = totalProd > 0 ? (((totalProd - totalScrap) / totalProd) * 100).toFixed(2) : 0;
            var scrapRate = totalProd > 0 ? ((totalScrap / totalProd) * 100).toFixed(2) : 0;
            var reworkRate = totalProd > 0 ? ((totalRework / totalProd) * 100).toFixed(2) : 0;
            var planAtt = totalPlan > 0 ? ((totalProd / totalPlan) * 100).toFixed(1) : 0;

            var kpis = [
                {label: 'Units Produced', value: totalProd.toLocaleString(), subtext: 'units'},
                {label: 'Units Planned', value: totalPlan.toLocaleString(), subtext: 'units'},
                {label: 'Yield %', value: yield, subtext: 'good quality'},
                {label: 'Scrap Rate %', value: scrapRate, subtext: scrapRate < 0.4 ? 'excellent' : 'acceptable'},
                {label: 'Rework Rate %', value: reworkRate, subtext: reworkRate < 2.5 ? 'good' : 'monitor'},
                {label: 'Plan Attainment %', value: planAtt, subtext: 'vs planned'},
                {label: 'Avg OEE %', value: avgOEE, subtext: 'average'},
                {label: 'Records', value: filtered.modelProduction.length, subtext: 'filtered'}
            ];

            kpis.forEach(function(kpi) {
                var card = document.createElement('div');
                card.className = 'kpi-card';
                card.innerHTML = '<div class="kpi-label">' + kpi.label + '</div>' +
                                '<div class="kpi-value">' + kpi.value + '</div>' +
                                '<div class="kpi-subtext">' + kpi.subtext + '</div>';
                grid.appendChild(card);
            });

            fitKpiText();
        }

        function updateCharts(filtered) {
            // Monthly Production Trend
            var months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            var monthlyByYear = {};
            filtered.monthlyProduction.forEach(function(d) {
                if (!monthlyByYear[d.year]) monthlyByYear[d.year] = {};
                monthlyByYear[d.year][d.month.substring(0, 3)] = d.produced;
            });

            var datasets = [];
            var colors = ['#1B3A5C', '#E87722', '#0EA5E9', '#F59E0B', '#94A3B8'];
            var years = Object.keys(monthlyByYear).sort();
            years.forEach(function(year, idx) {
                datasets.push({
                    label: year,
                    data: months.map(function(m) { return monthlyByYear[year][m] || 0; }),
                    borderColor: colors[idx % colors.length],
                    backgroundColor: 'rgba(0,0,0,0.05)',
                    tension: 0.4
                });
            });

            mk('monthlyProductionTrend', {
                type: 'line',
                data: {
                    labels: months,
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'top' } },
                    scales: { y: { beginAtZero: true } }
                }
            });

            // Production by Model (with brand filter applied)
            var models = {};
            filtered.modelProduction.forEach(function(d) {
                var key = d.model;
                models[key] = (models[key] || 0) + d.produced;
            });
            var modelLabels = Object.keys(models).sort(function(a, b) { return models[b] - models[a]; }).slice(0, 10);

            mk('productionByModel', {
                type: 'bar',
                data: {
                    labels: modelLabels,
                    datasets: [{
                        label: 'Units Produced',
                        data: modelLabels.map(function(m) { return models[m]; }),
                        backgroundColor: '#1B3A5C'
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { x: { beginAtZero: true } }
                }
            });

            // Plant Comparison
            var plants = {};
            filtered.plantProduction.forEach(function(d) {
                if (!plants[d.plant]) plants[d.plant] = {produced: 0, planned: 0};
                plants[d.plant].produced += d.produced;
                plants[d.plant].planned += d.planned;
            });
            var plantLabels = Object.keys(plants).sort();

            mk('plantComparison', {
                type: 'bar',
                data: {
                    labels: plantLabels,
                    datasets: [
                        {
                            label: 'Produced',
                            data: plantLabels.map(function(p) { return plants[p].produced; }),
                            backgroundColor: '#1B3A5C'
                        },
                        {
                            label: 'Planned',
                            data: plantLabels.map(function(p) { return plants[p].planned; }),
                            backgroundColor: '#E87722'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { y: { beginAtZero: true } }
                }
            });

            // Yearly Production Trend (replaces Shift Comparison)
            var yearlyTotals = {};
            filtered.plantProduction.forEach(function(d) {
                yearlyTotals[d.year] = (yearlyTotals[d.year] || 0) + d.produced;
            });
            var yearLabels = Object.keys(yearlyTotals).sort();

            mk('yearlyProductionTrend', {
                type: 'bar',
                data: {
                    labels: yearLabels,
                    datasets: [{
                        label: 'Total Production',
                        data: yearLabels.map(function(y) { return yearlyTotals[y]; }),
                        backgroundColor: ['#1B3A5C', '#E87722', '#0EA5E9', '#F59E0B', '#94A3B8']
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true } }
                }
            });

            // Brand Mix
            var brands = {};
            filtered.modelProduction.forEach(function(d) {
                brands[d.brand] = (brands[d.brand] || 0) + d.produced;
            });
            var brandLabels = Object.keys(brands).sort();

            mk('brandMix', {
                type: 'bar',
                data: {
                    labels: brandLabels,
                    datasets: [{
                        label: 'Production',
                        data: brandLabels.map(function(b) { return brands[b]; }),
                        backgroundColor: '#0EA5E9'
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { x: { beginAtZero: true } }
                }
            });

            // OEE by Model
            var modelOEE = {};
            filtered.modelProduction.forEach(function(d) {
                if (!modelOEE[d.model]) modelOEE[d.model] = {oee: 0, count: 0};
                modelOEE[d.model].oee += d.oee;
                modelOEE[d.model].count += 1;
            });
            var oeeLabels = Object.keys(modelOEE).sort().slice(0, 10);

            mk('oeeByModel', {
                type: 'bar',
                data: {
                    labels: oeeLabels,
                    datasets: [{
                        label: 'OEE %',
                        data: oeeLabels.map(function(m) { return (modelOEE[m].oee / modelOEE[m].count).toFixed(2); }),
                        backgroundColor: '#F59E0B'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true, max: 100 } }
                }
            });
        }

        function updateTable(filtered) {
            var tbody = document.querySelector('#detailTable tbody');
            tbody.innerHTML = '';

            filtered.modelProduction.forEach(function(row) {
                var yield = row.produced > 0 ? (((row.produced - row.scrapped) / row.produced) * 100).toFixed(2) : 0;
                var scrapPct = row.produced > 0 ? ((row.scrapped / row.produced) * 100).toFixed(2) : 0;
                var reworkPct = row.produced > 0 ? ((row.reworked / row.produced) * 100).toFixed(2) : 0;

                var tr = document.createElement('tr');
                tr.innerHTML = '<td>' + row.year + '</td>' +
                              '<td>' + row.brand + '</td>' +
                              '<td>' + row.model + '</td>' +
                              '<td>' + row.produced.toLocaleString() + '</td>' +
                              '<td>' + row.planned.toLocaleString() + '</td>' +
                              '<td>' + yield + '%</td>' +
                              '<td>' + scrapPct + '%</td>' +
                              '<td>' + reworkPct + '%</td>' +
                              '<td>' + row.oee.toFixed(2) + '%</td>';
                tbody.appendChild(tr);
            });
        }

        function applyFilters() {
            var filters = getFilters();
            var filtered = {
                monthlyProduction: DATA.monthlyProduction.filter(function(d) {
                    return (!filters.year || parseInt(d.year) === parseInt(filters.year));
                }),
                modelProduction: DATA.modelProduction.filter(function(d) {
                    return (!filters.year || parseInt(d.year) === parseInt(filters.year)) &&
                           (!filters.brand || d.brand == filters.brand);
                }),
                plantProduction: DATA.plantProduction.filter(function(d) {
                    return (!filters.year || parseInt(d.year) === parseInt(filters.year)) && (!filters.plant || d.plant == filters.plant);
                })
            };

            updateKPIs(filtered);
            updateCharts(filtered);
            updateTable(filtered);
        }

        window.addEventListener('load', function() {
            applyFilters();
        });
    </script>
