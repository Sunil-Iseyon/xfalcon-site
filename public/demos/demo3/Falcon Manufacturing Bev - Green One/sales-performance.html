            --danger: #FF4444;
            --success: #7CB701;

        }

        body {

            line-height: 1.6;

        }

        .header-title h1 {

            font-weight: 700;
            letter-spacing: 1px;
        }

        .brand-icon {
            font-size: 32px;
            color: var(--primary);
        }

        .back-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            padding: 8px 16px;
            border: 1px solid var(--primary);
            border-radius: 4px;
            transition: all 0.3s ease;

        .back-link:hover {

        }

            border: 1px solid rgba(124, 183, 1, 0.2);
            padding: 20px 30px;
            display: flex;
            gap: 30px;
            align-items: center;
            flex-wrap: wrap;
            margin: 20px 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .filter-group label {
            font-size: 12px;
            font-weight: 600;
            color: var(--secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filter-group select {
            background-color: rgba(124, 183, 1, 0.1);
            color: var(--text-light);
            border: 1px solid var(--primary);
            padding: 10px 12px;
            border-radius: 4px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 150px;
        }

        .filter-group select:hover {
            border-color: var(--secondary);
            background-color: rgba(149, 214, 0, 0.1);
        }

        .filter-group select:focus {
            outline: none;
            border-color: var(--secondary);
            box-shadow: 0 0 8px rgba(149, 214, 0, 0.3);
        }

        .container {
            padding: 0 30px 30px 30px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .kpi-card {
            background-color: var(--bg-card);
            border: 1px solid rgba(124, 183, 1, 0.2);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        .kpi-card:hover {
            border-color: var(--primary);
            box-shadow: 0 4px 16px rgba(124, 183, 1, 0.15);
            transform: translateY(-2px);
        }

        .kpi-label {
            font-size: 12px;
            color: var(--text-gray);
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .kpi-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--secondary);
            margin-bottom: 8px;
            word-break: break-word;
        }

        .kpi-change {
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .kpi-change.positive { color: var(--success); }
        .kpi-change.negative { color: var(--danger); }

        .chart-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .chart-grid.two-col {
            grid-template-columns: repeat(2, 1fr);
        }

        .chart-card {
            background-color: var(--bg-card);
            border: 1px solid rgba(124, 183, 1, 0.2);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
        }

        .chart-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--secondary);
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .chart-container {
            position: relative;
            height: 300px;
            width: 100%;
        }

        .chart-container-large {
            position: relative;
            height: 400px;
            width: 100%;
        }

        .table-card {
            background-color: var(--bg-card);
            border: 1px solid rgba(124, 183, 1, 0.2);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
            overflow-x: auto;
            margin-bottom: 30px;

        .table-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--secondary);
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;

        table { width: 100%; border-collapse: collapse; }

        th {
            background-color: rgba(124, 183, 1, 0.1);
            color: var(--secondary);
            padding: 12px;
            text-align: left;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.5px;
            border-bottom: 2px solid var(--primary);

        td {
            padding: 12px;
            border-bottom: 1px solid rgba(124, 183, 1, 0.1);
            color: var(--text-light);
        }

        tr:last-child td { border-bottom: none; }

        .numeric {
            text-align: right;
            font-family: 'Courier New', monospace;
            color: var(--secondary);
        }

            color: var(--text-gray);

        // ===== UTILITY FUNCTIONS =====
        function filterData(data, yearVal, quarterVal) {
            return data.filter(function(item) {
                var yMatch = !yearVal || String(item.year) === String(yearVal);
                var qMatch = !quarterVal || !item.hasOwnProperty('quarter') || String(item.quarter) === String(quarterVal);
                return yMatch && qMatch;
            });
        }

        function fmt$(v) {
            return '$' + Number(v).toLocaleString('en-US', {minimumFractionDigits:0, maximumFractionDigits:0});
        }

        function fmtN(v) {
            return Number(v).toLocaleString('en-US', {minimumFractionDigits:0, maximumFractionDigits:0});
        }

        function destroyChart(key) {
            if (charts[key]) {
                charts[key].destroy();

        // ===== KPI CARDS =====
        function renderKPIs(yv, qv) {
            var f = filterData(salesByQuarter, yv, qv);
            var el = document.getElementById('kpiGrid');
            if (f.length === 0) { el.innerHTML = '<div class="no-data">No data for selected filters</div>'; return; }

            var totRev = 0, totProfit = 0, totMargin = 0, totUnits = 0, totOrders = 0;
            for (var i = 0; i < f.length; i++) {
                totRev += f[i].net_rev;
                totProfit += f[i].gross_profit;
                totMargin += f[i].avg_margin;
                totUnits += f[i].units_shipped;
                totOrders += f[i].orders;
            }
            var avgMargin = totMargin / f.length;

            var prevYear = yv ? String(Number(yv) - 1) : '';
            var prev = filterData(salesByQuarter, prevYear, qv);
            var prevRev = 0;
            for (var i = 0; i < prev.length; i++) prevRev += prev[i].net_rev;
            var yoy = prevRev > 0 ? ((totRev - prevRev) / prevRev * 100) : 0;

            var kpis = [
                {label:'Total Net Revenue', value: fmt$(totRev), change: yoy.toFixed(1)},
                {label:'Gross Profit', value: fmt$(totProfit), change: prevRev > 0 ? ((totProfit - prev.reduce(function(s,x){return s+x.gross_profit},0)) / prev.reduce(function(s,x){return s+x.gross_profit},0) * 100).toFixed(1) : '0.0'},
                {label:'Avg Margin %', value: avgMargin.toFixed(2) + '%', change: '0.0'},
                {label:'Total Units Shipped', value: fmtN(totUnits), change: '0.0'},
                {label:'Total Orders', value: fmtN(totOrders), change: '0.0'}
            ];

            var html = '';
            for (var i = 0; i < kpis.length; i++) {
                var k = kpis[i];
                var cls = parseFloat(k.change) >= 0 ? 'positive' : 'negative';
                var arrow = parseFloat(k.change) >= 0 ? '↑' : '↓';
                html += '<div class="kpi-card"><div class="kpi-label">' + k.label + '</div><div class="kpi-value">' + k.value + '</div><div class="kpi-change ' + cls + '">' + arrow + ' ' + k.change + '%</div></div>';
            }
            el.innerHTML = html;
        }

        // ===== INSIGHTS =====
        function generateInsights(yv, qv) {
            var f = filterData(salesByQuarter, yv, qv);
            var insEl = document.getElementById('insightsContent');
            var focEl = document.getElementById('focusAreas');

            if (f.length === 0) { insEl.innerHTML = ''; focEl.innerHTML = ''; return; }

            var totRev = 0, totProfit = 0, totMargin = 0, totUnits = 0, totReturned = 0, totDiscount = 0;
            for (var i = 0; i < f.length; i++) {
                totRev += f[i].net_rev;
                totProfit += f[i].gross_profit;
                totMargin += f[i].avg_margin;
                totUnits += f[i].units_shipped;
                totReturned += f[i].units_returned;
                totDiscount += f[i].discount;
            }
            var avgMargin = totMargin / f.length;
            var returnRate = (totReturned / totUnits * 100);
            var discountPct = (totDiscount / totRev * 100);

            // Top category
            var catData = filterData(salesByCategory, yv, '');
            var topCat = catData.length > 0 ? catData.reduce(function(p,c){return p.net_rev > c.net_rev ? p : c}) : {category:'N/A', net_rev:0};

            // Top channel
            var chData = filterData(salesByChannel, yv, '');
            var topCh = chData.length > 0 ? chData.reduce(function(p,c){return p.net_rev > c.net_rev ? p : c}) : {channel:'N/A'};

            // Top region
            var regData = filterData(salesByRegion, yv, '');
            var topReg = regData.length > 0 ? regData.reduce(function(p,c){return p.net_rev > c.net_rev ? p : c}) : {region:'N/A', net_rev:0};
            var regTotal = regData.reduce(function(s,r){return s+r.net_rev}, 0);
            var regConc = regTotal > 0 ? (topReg.net_rev / regTotal * 100) : 0;

            // Margin direction
            var firstHalf = f.slice(0, Math.ceil(f.length/2));
            var secondHalf = f.slice(Math.ceil(f.length/2));
            var m1 = firstHalf.reduce(function(s,d){return s+d.avg_margin},0) / firstHalf.length;
            var m2 = secondHalf.length > 0 ? secondHalf.reduce(function(s,d){return s+d.avg_margin},0) / secondHalf.length : m1;
            var mDir = m2 > m1 ? 'improving' : 'declining';

            var html = '<div style="margin-left:20px;">';
            html += '<div style="margin-bottom:12px;"><span style="color:#7CB701;">&#8226;</span> Top performing category: <strong style="color:#95D600;">' + topCat.category + '</strong> with ' + fmt$(topCat.net_rev) + '</div>';
            html += '<div style="margin-bottom:12px;"><span style="color:#7CB701;">&#8226;</span> Strongest channel: <strong style="color:#95D600;">' + topCh.channel + '</strong></div>';
            html += '<div style="margin-bottom:12px;"><span style="color:#7CB701;">&#8226;</span> Regional concentration: ' + regConc.toFixed(1) + '% from <strong style="color:#95D600;">' + topReg.region + '</strong></div>';
            html += '<div style="margin-bottom:12px;"><span style="color:#7CB701;">&#8226;</span> Margin trend is <strong style="color:' + (mDir==='improving'?'#7CB701':'#FF4444') + ';">' + mDir + '</strong>: ' + m1.toFixed(2) + '% → ' + m2.toFixed(2) + '%</div>';
            html += '<div style="margin-bottom:12px;"><span style="color:#7CB701;">&#8226;</span> Discount as % of revenue: <strong style="color:#FFB800;">' + discountPct.toFixed(2) + '%</strong> (' + fmt$(totDiscount) + ')</div>';
            html += '</div>';
            insEl.innerHTML = html;

            var focus = '';
            if (regConc > 30) focus += '<div style="margin-bottom:10px;"><span style="color:#FFB800;">→</span> Regional concentration risk — diversify across regions</div>';
            if (discountPct > 20) focus += '<div style="margin-bottom:10px;"><span style="color:#FFB800;">→</span> High discount activity — review pricing strategy</div>';
            if (mDir === 'declining') focus += '<div style="margin-bottom:10px;"><span style="color:#FFB800;">→</span> Margin erosion — investigate cost drivers</div>';
            if (returnRate > 2) focus += '<div style="margin-bottom:10px;"><span style="color:#FFB800;">→</span> Return rate above 2% — review product quality</div>';
            if (!focus) focus = '<div style="margin-bottom:10px;"><span style="color:#7CB701;">✓</span> Sales metrics performing well — maintain current strategies</div>';
            focEl.innerHTML = focus;
        }

        // ===== MAIN UPDATE =====
        function updateDashboard() {
            var yv = document.getElementById('yearFilter').value;
            var qv = document.getElementById('quarterFilter').value;

            renderKPIs(yv, qv);
            renderRevenueTrend(yv, qv);
            renderCategory(yv, qv);
            renderChannel(yv, qv);
            renderRegion(yv, qv);
            renderMarginTrend(yv, qv);
            renderTopProducts();
            renderDiscountRevenue(yv, qv);
            generateInsights(yv, qv);
        }

        // ===== EVENT LISTENERS =====
        document.getElementById('yearFilter').addEventListener('change', updateDashboard);
        document.getElementById('quarterFilter').addEventListener('change', updateDashboard);

        // ===== INITIAL RENDER =====
        updateDashboard();
