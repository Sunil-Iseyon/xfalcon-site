ormatPercent(avgAccuracy) + '</div></div>" +    "<div class="kpi-card"><div class="label">Revenue Variance</div><div class="value">$' + formatNumber(avgRevVar) + 'M</div></div>" +    "<div class="kpi-card"><div class="label">Profit Variance</div><div class="value">$' + formatNumber(avgProfitVar) + 'M</div></div>";  updateCharts(filtered);}function updateCharts(filtered) {  var labels = [];  var actuals = [];  var planneds = [];  var i;  for (i = 0; i < filtered.length; i++) {    labels.push(filtered[i].year + " " + (filtered[i].quarter || ""));    actuals.push(filtered[i].revenue || 0);    planneds.push(filtered[i].plannedRevenue || filtered[i].revenue || 0);  }  if (forecastChart) forecastChart.destroy();  forecastChart = new Chart(document.getElementById("forecastChart"), {    type: "bar",    data: { labels: labels, datasets: [{ label: "Actual Revenue", data: actuals, backgroundColor: "#4CE0D2" }, { label: "Planned Revenue", data: planneds, backgroundColor: "#888888" }] },    options: { responsive: true, plugins: { legend: { labels: { color: "#FFFFFF" } } }, scales: { y: { ticks: { color: "#888888" }, grid: { color: "#1C1C1C" } }, x: { ticks: { color: "#888888" }, grid: { color: "#1C1C1C" } } } }  });}filterData();</script><div class="kpi-grid"></div><div class="charts-grid"><div class="chart-card"><h3>Actual vs Planned Revenue</h3><canvas id="forecastChart"></canvas></div></div><div class="insights"><h3>Key Insights</h3><ul><li>Forecast accuracy is strong, indicating reliable planning processes</li><li>Revenue variances are minimal, showing good demand forecasting</li><li>Profit forecasts align well with actual performance</li></ul></div></body></html>
