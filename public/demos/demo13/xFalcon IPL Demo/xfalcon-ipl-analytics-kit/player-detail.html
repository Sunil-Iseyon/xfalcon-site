  <title>Player Detail - xFalcon IPL Analytics Kit</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js" integrity="sha384-e6nUZLBkQ86NJ6TVVKAeSaK8jWa3NhkYWZFomE39AvDbQWeie9PlQqM3pmYW5d1g" crossorigin="anonymous"></script>
  <style>
    :root {
      --color-dark: #1A1A1A;
      --color-base: #F5F6F8;
      --color-card: #FFFFFF;
      --color-accent: #4ECDC4;
      --color-accent2: #F7946B;
      --color-green: #4CAF50;
      --color-red: #FF4757;
      --color-text: #1A1A1A;
      --color-text-sec: #64748B;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--color-base);
      color: var(--color-text);
      line-height: 1.6;
    }

    /* Topbar */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: var(--color-dark);
      padding: 16px 24px;
      color: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .logo {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .title {
      font-size: 16px;
      font-weight: 600;
      color: rgba(255,255,255,0.9);
    }

    .back-link {
      color: var(--color-accent);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.3s ease;
    }

    .back-link:hover {
      color: var(--color-accent2);
    }

    /* Main container */
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }

    /* Player Profile Card */
    .profile-card {
      background-color: var(--color-card);
      border-radius: 8px;
      padding: 32px;
      margin-bottom: 32px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .profile-header {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      margin-bottom: 24px;
    }

    .profile-left {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .player-name {
      font-size: 32px;
      font-weight: 700;
      color: var(--color-text);
      margin-bottom: 12px;
    }

    .team-badge {
      display: inline-flex;
      align-items: center;
      background-color: var(--color-accent);
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      width: fit-content;
      margin-bottom: 16px;
    }

    .nationality {
      font-size: 14px;
      color: var(--color-text-sec);
      margin-bottom: 4px;
    }

    .profile-right {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
    }

    .stat-box {
      background-color: var(--color-base);
      padding: 16px;
      border-radius: 6px;
      border-left: 3px solid var(--color-accent);
    }

    .stat-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--color-text-sec);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--color-text);
    }

    .profile-attributes {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid rgba(0,0,0,0.06);
    }

    .attribute-pill {
      background-color: var(--color-base);
      padding: 10px 14px;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 500;
      color: var(--color-text-sec);
      border-left: 2px solid var(--color-accent);
    }

    .attribute-pill.status-active {
      border-left-color: var(--color-green);
      color: var(--color-green);
      font-weight: 600;
    }

    .attribute-pill.status-retired {
      border-left-color: var(--color-red);
      color: var(--color-red);
      font-weight: 600;
    }

    .attribute-pill.overseas {
      border-left-color: var(--color-accent2);
      color: var(--color-accent2);
      font-weight: 600;
    }

    /* Section Title */
    .section-title {
      background-color: var(--color-dark);
      color: white;
      padding: 14px 24px;
      font-size: 15px;
      font-weight: 600;
      margin: 32px 0 16px 0;
      border-left: 4px solid var(--color-accent);
      border-radius: 2px;
    }

    /* Season Table */
    .table-wrapper {
      background-color: var(--color-card);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      margin-bottom: 32px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead {
      background-color: var(--color-dark);
      color: white;
    }

    th {
      padding: 14px 12px;
      text-align: left;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      border-right: 1px solid rgba(0,0,0,0.1);
    }

    th:last-child {
      border-right: none;
    }

    td {
      padding: 12px;
      border-right: 1px solid rgba(0,0,0,0.06);
      color: var(--color-text);
    }

    td:last-child {
      border-right: none;
    }

    tbody tr {
      border-bottom: 1px solid rgba(0,0,0,0.04);
      transition: background-color 0.2s ease;
    }

    tbody tr:nth-child(even) {
      background-color: rgba(0,0,0,0.01);
    }

    tbody tr:hover {
      background-color: rgba(74, 205, 196, 0.05);
    }

    tbody tr.orange-cap {
      border-left: 3px solid var(--color-accent);
      background-color: rgba(78, 205, 196, 0.08);
    }

    tbody tr.purple-cap {
      border-left: 3px solid var(--color-accent2);
      background-color: rgba(247, 148, 107, 0.08);
    }

    /* Charts Section */
    .charts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-bottom: 32px;
    }

    .chart-card {
      background-color: var(--color-card);
      border-radius: 8px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .chart-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--color-text);
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .chart-container {
      position: relative;
      height: 300px;
    }

    /* Directory Section */
    .search-box {
      background-color: var(--color-card);
      padding: 20px 24px;
      border-radius: 8px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .search-input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid rgba(0,0,0,0.1);
      border-radius: 6px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.3s ease;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--color-accent);
      box-shadow: 0 0 0 3px rgba(78, 205, 196, 0.1);
    }

    .player-link {
      color: var(--color-accent);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s ease;
    }

    .player-link:hover {
      color: var(--color-accent2);
      text-decoration: underline;
    }

    tbody tr.current-player {
      border-left: 3px solid var(--color-accent);
      background-color: rgba(78, 205, 196, 0.06);
    }

    .status-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 3px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .status-badge.active {
      background-color: rgba(76, 175, 80, 0.2);
      color: var(--color-green);
    }

    .status-badge.retired {
      background-color: rgba(255, 71, 87, 0.2);
      color: var(--color-red);
    }

    /* Footer */
    .footer {
      background-color: var(--color-dark);
      color: rgba(255, 255, 255, 0.8);
      text-align: center;
      padding: 24px;
      font-size: 13px;
      margin-top: 40px;
    }

    .no-data {
      background-color: var(--color-card);
      border-radius: 8px;
      padding: 32px;
      text-align: center;
      color: var(--color-text-sec);
      margin-bottom: 32px;
    }

    /* Responsive */
    @media (max-width: 1024px) {
      .profile-header {
        grid-template-columns: 1fr;
        gap: 24px;
      }

      .profile-right {
        grid-template-columns: 1fr 1fr;
      }

      .charts-grid {
        grid-template-columns: 1fr;
      }

      table {
        font-size: 12px;
      }

      th, td {
        padding: 10px 8px;
      }
    }

    @media (max-width: 768px) {
      .container {
        padding: 16px;
      }

      .topbar {
        padding: 12px 16px;
        flex-direction: column;
        gap: 12px;
      }

      .topbar-left {
        gap: 16px;
      }

      .player-name {
        font-size: 24px;
      }

      .profile-card {
        padding: 20px;
      }

      .profile-right {
        grid-template-columns: 1fr;
      }

      .profile-attributes {
        grid-template-columns: repeat(2, 1fr);
      }

      table {
        font-size: 11px;
        display: block;
        overflow-x: auto;
        white-space: nowrap;
      }
    }
  </style>
</head>

        {year:2025,team:'SRH',teamFull:'Sunrisers Hyderabad',mat:14,inn:10,runs:375,hs:75,avg:28.00,sr:130.00,fours:30,sixes:11,fifties:3,hundreds:0,innBowl:0,overs:0.0,wkt:0,best:'0/30',bowlAvg:0.00,econ:9.30,catches:4,runouts:0,mvp:60.00,ocRank:1,pcRank:155}

    };

    var charts = {};
    var cTurq = '#4ECDC4';
    var cCoral = '#F7946B';
    var cGray = '#94A3B8';
    var cText = '#64748B';
    var cGrid = 'rgba(0,0,0,0.06)';

    function mk(id, type, data, opts) {
      if (charts[id]) {
        charts[id].destroy();
      }
      charts[id] = new Chart(document.getElementById(id), {
        type: type,
        data: data,
        options: opts
      });
      return charts[id];
    }

    function getNationalityEmoji(nat) {
      var emojiMap = {
        'India': '🇮🇳',
        'South Africa': '🇿🇦',
        'England': '🇬🇧',
        'West Indies': '🇼🇮',
        'Australia': '🇦🇺',
        'New Zealand': '🇳🇿',
        'Pakistan': '🇵🇰',
        'Sri Lanka': '🇱🇰',
        'Afghanistan': '🇦🇫'
      };
      return emojiMap[nat] || '';
    }

    function renderProfileCard(player) {
      var html = '';
      html = html + '<div class="profile-header">';
      html = html + '<div class="profile-left">';
      html = html + '<div class="player-name">' + player.name + '</div>';
      html = html + '<div class="team-badge">' + player.team + '</div>';
      html = html + '<div class="nationality">' + getNationalityEmoji(player.nat) + ' ' + player.nat + '</div>';
      html = html + '</div>';
      html = html + '<div class="profile-right">';
      html = html + '<div class="stat-box">';
      html = html + '<div class="stat-label">Career Matches</div>';
      html = html + '<div class="stat-value">' + player.cMat + '</div>';
      html = html + '</div>';
      html = html + '<div class="stat-box">';
      html = html + '<div class="stat-label">Career Runs</div>';
      html = html + '<div class="stat-value">' + player.cRuns + '</div>';
      html = html + '</div>';
      html = html + '<div class="stat-box">';
      html = html + '<div class="stat-label">Career Wickets</div>';
      html = html + '<div class="stat-value">' + player.cWkt + '</div>';
      html = html + '</div>';
      html = html + '</div>';
      html = html + '</div>';

      html = html + '<div class="profile-attributes">';
      html = html + '<div class="attribute-pill">Bat: ' + player.bat + '</div>';
      html = html + '<div class="attribute-pill">Bowl: ' + player.bowl + '</div>';
      html = html + '<div class="attribute-pill">Role: ' + player.role + '</div>';
      html = html + '<div class="attribute-pill">Debut: ' + player.debut + '</div>';
      var statusClass = player.active ? 'status-active' : 'status-retired';
      var statusText = player.active ? 'Active' : 'Retired';
      html = html + '<div class="attribute-pill ' + statusClass + '">' + statusText + '</div>';
      if (player.overseas) {
        html = html + '<div class="attribute-pill overseas">Overseas</div>';
      }
      html = html + '</div>';

      document.getElementById('profileCard').innerHTML = html;
    }

    function renderSeasonTable(player, seasons) {
      var html = '';
      html = html + '<div class="section-title">Season-by-Season Performance</div>';
      html = html + '<div class="table-wrapper">';
      html = html + '<table>';
      html = html + '<thead>';
      html = html + '<tr>';
      html = html + '<th>Season</th><th>Team</th><th>Mat</th><th>Inn</th><th>Runs</th><th>HS</th><th>Avg</th><th>SR</th>';
      html = html + '<th>4s</th><th>6s</th><th>50s</th><th>100s</th><th>Overs</th><th>Wkts</th><th>Best</th>';
      html = html + '<th>Bowl Avg</th><th>Econ</th><th>Catches</th><th>RO</th><th>MVP</th><th>OC Rank</th><th>PC Rank</th>';
      html = html + '</tr>';
      html = html + '</thead>';
      html = html + '<tbody>';

      var i = 0;
      while (i < seasons.length) {
        var season = seasons[i];
        var rowClass = '';
        if (season.ocRank === 1) {
          rowClass = 'orange-cap';
        } else if (season.pcRank === 1) {
          rowClass = 'purple-cap';
        }
        html = html + '<tr class="' + rowClass + '">';
        html = html + '<td>' + season.year + '</td>';
        html = html + '<td>' + season.team + '</td>';
        html = html + '<td>' + season.mat + '</td>';
        html = html + '<td>' + season.inn + '</td>';
        html = html + '<td>' + season.runs + '</td>';
        html = html + '<td>' + season.hs + '</td>';
        html = html + '<td>' + season.avg.toFixed(2) + '</td>';
        html = html + '<td>' + season.sr.toFixed(2) + '</td>';
        html = html + '<td>' + season.fours + '</td>';
        html = html + '<td>' + season.sixes + '</td>';
        html = html + '<td>' + season.fifties + '</td>';
        html = html + '<td>' + season.hundreds + '</td>';
        html = html + '<td>' + season.overs + '</td>';
        html = html + '<td>' + season.wkt + '</td>';
        html = html + '<td>' + season.best + '</td>';
        html = html + '<td>' + season.bowlAvg.toFixed(2) + '</td>';
        html = html + '<td>' + season.econ.toFixed(2) + '</td>';
        html = html + '<td>' + season.catches + '</td>';
        html = html + '<td>' + season.runouts + '</td>';
        html = html + '<td>' + season.mvp.toFixed(2) + '</td>';
        html = html + '<td>' + season.ocRank + '</td>';
        html = html + '<td>' + season.pcRank + '</td>';
        html = html + '</tr>';
        i++;
      }

      html = html + '</tbody>';
      html = html + '</table>';
      html = html + '</div>';

      document.getElementById('seasonSection').innerHTML = html;
    }

    function renderCharts(player, seasons) {
      var years = [];
      var runsData = [];
      var srData = [];

      var i = 0;
      while (i < seasons.length) {
        var season = seasons[i];
        years.push(String(season.year));
        runsData.push(season.runs);
        srData.push(season.sr);
        i++;
      }

      var html = '';
      html = html + '<div class="section-title">Performance Analysis</div>';
      html = html + '<div class="charts-grid">';
      html = html + '<div class="chart-card">';
      html = html + '<div class="chart-title">Runs per Season</div>';
      html = html + '<div class="chart-container">';
      html = html + '<canvas id="runsChart"></canvas>';
      html = html + '</div>';
      html = html + '</div>';
      html = html + '<div class="chart-card">';
      html = html + '<div class="chart-title">Strike Rate Trend</div>';
      html = html + '<div class="chart-container">';
      html = html + '<canvas id="srChart"></canvas>';
      html = html + '</div>';
      html = html + '</div>';
      html = html + '</div>';

      document.getElementById('chartsSection').innerHTML = html;

      setTimeout(function() {
        mk('runsChart', 'bar', {
          labels: years,
          datasets: [{
            label: 'Runs',
            data: runsData,
            backgroundColor: cTurq,
            borderColor: cTurq,
            borderWidth: 0,
            borderRadius: 4
          }]
        }, {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              display: false
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              grid: {
                color: cGrid
              },
              ticks: {
                color: cText
              }
            },
            x: {
              grid: {
                display: false
              },
              ticks: {
                color: cText
              }
            }
          }
        });

        mk('srChart', 'line', {
          labels: years,
          datasets: [{
            label: 'Strike Rate',
            data: srData,
            borderColor: cCoral,
            backgroundColor: 'rgba(247, 148, 107, 0.2)',
            borderWidth: 2,
            fill: true,
            tension: 0.3,
            pointBackgroundColor: cCoral,
            pointBorderColor: cCoral,
            pointRadius: 4,
            pointHoverRadius: 6
          }]
        }, {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              display: false
            }
          },
          scales: {
            y: {
              beginAtZero: false,
              grid: {
                color: cGrid
              },
              ticks: {
                color: cText
              }
            },
            x: {
              grid: {
                display: false
              },
              ticks: {
                color: cText
              }
            }
          }
        });
      }, 100);
    }

    function renderPlayerDirectory(currentPlayerId) {
      var html = '';
      var i = 0;
      while (i < players.length) {
        var p = players[i];
        var rowClass = '';
        if (p.key === currentPlayerId) {
          rowClass = 'current-player';
        }
        var statusBadgeClass = p.active ? 'active' : 'retired';
        var statusText = p.active ? 'Active' : 'Retired';
        html = html + '<tr class="' + rowClass + '">';
        html = html + '<td><a href="player-detail.html?id=' + p.key + '" class="player-link">' + p.name + '</a></td>';
        html = html + '<td>' + p.nat + '</td>';
        html = html + '<td>' + p.role + '</td>';
        html = html + '<td>' + p.team + '</td>';
        html = html + '<td>' + p.cMat + '</td>';
        html = html + '<td>' + p.cRuns + '</td>';
        html = html + '<td>' + p.cWkt + '</td>';
        html = html + '<td>' + p.sRuns + '</td>';
        html = html + '<td>' + p.sSR.toFixed(2) + '</td>';
        html = html + '<td><span class="status-badge ' + statusBadgeClass + '">' + statusText + '</span></td>';
        html = html + '</tr>';
        i++;
      }
      document.getElementById('playerTableBody').innerHTML = html;
    }

    function initSearch() {
      var searchInput = document.getElementById('searchInput');
      var tableBody = document.getElementById('playerTableBody');

      searchInput.oninput = function() {
        var query = searchInput.value.toLowerCase();
        var rows = tableBody.getElementsByTagName('tr');
        var j = 0;
        while (j < rows.length) {
          var row = rows[j];
          var cells = row.getElementsByTagName('td');
          if (cells.length > 0) {
            var playerName = cells[0].textContent.toLowerCase();
            if (playerName.indexOf(query) !== -1) {
              row.style.display = '';
            } else {
              row.style.display = 'none';
            }
          }
          j++;
        }
      };
    }

    function init() {
      var params = new URLSearchParams(window.location.search);
      var pid = parseInt(params.get('id')) || 195;

      var player = null;
      var i = 0;
      while (i < players.length) {
        if (players[i].key === pid) {
          player = players[i];
          break;
        }
        i++;
      }

      if (!player) {
        player = players[0];
      }

      renderProfileCard(player);

      if (seasonHistory[player.key]) {
        renderSeasonTable(player, seasonHistory[player.key]);
        renderCharts(player, seasonHistory[player.key]);
      } else {
        var noDataHtml = '<div class="section-title">Season-by-Season Performance</div>';
        noDataHtml = noDataHtml + '<div class="no-data">Season history available for featured players only</div>';
        document.getElementById('seasonSection').innerHTML = noDataHtml;
      }

      renderPlayerDirectory(player.key);
      initSearch();
    }

    init();
  </script>
